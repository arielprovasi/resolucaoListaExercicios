<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 1 - Comentário</title>
    <link rel="stylesheet" href="./estilo/style.css" />
  </head>
  <body>
    <main>
      <nav aria-label="Voltar ao índice">
        <a href="../index.html">Voltar para a lista de exercícios</a>
      </nav>
      <h1>Deixe um comentário</h1>

      <form action="#" method="post">
        <label for="name">Nome:</label>
        <input id="name" name="name" type="text" required />

        <label for="email">Email:</label>
        <input id="email" name="email" type="email" required />

        <label for="website">Website:</label>
        <input id="website" name="website" type="url" />

        <label for="comment">Comentário:</label>
        <textarea id="comment" name="comment" rows="8" required></textarea>

        <p>
          Observação: Seu comentário será publicado após passar pelo moderador.
        </p>

        <button type="submit">Enviar Comentário</button>
      </form>
    </main>
  </body>
</html>
