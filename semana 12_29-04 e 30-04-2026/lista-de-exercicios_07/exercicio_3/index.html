<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 3 - Dados Pessoais</title>
    <link rel="stylesheet" href="./estilo/style.css" />
  </head>
  <body>
    <main>
      <nav aria-label="Voltar ao índice">
        <a href="../index.html">Voltar para a lista de exercícios</a>
      </nav>
      <form action="#" method="post">
        <fieldset>
          <legend>Dados Pessoais</legend>
          <section class="form-columns" aria-label="Endereço e telefone">
            <fieldset>
              <legend>Dados de Endereço</legend>

              <label for="cidade">Cidade:</label>
              <input id="cidade" name="cidade" type="text" required />

              <label for="cep">CEP:</label>
              <input id="cep" name="cep" type="text" required />
            </fieldset>

            <fieldset>
              <legend>Dados de Telefone</legend>

              <label for="telefone-residencial">Residencial:</label>
              <input
                id="telefone-residencial"
                name="telefoneResidencial"
                type="tel"
                required
              />

              <label for="telefone-celular">Celular:</label>
              <input
                id="telefone-celular"
                name="telefoneCelular"
                type="tel"
                required
              />
            </fieldset>
          </section>
        </fieldset>
      </form>
    </main>
  </body>
</html>
